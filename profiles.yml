dvdrentals:
  target: dev
  outputs:
    dev:
      type: redshift
      method: iam
      # placeholder — `python scripts/deploy.py configure-dbt` fills the real
      # Redshift Serverless endpoint and writes the result to ~/.dbt/profiles.yml
      host: REPLACED_BY_DEPLOY_CLI
      port: 5439
      database: dev
      workgroup: redshift-serverless-workgroup
      schema: starschema
      region: us-west-2
      threads: 1
      iam_profile: default
      user: admin
      is_serverless: true
      serverless_work_group: redshift-serverless-workgroup
